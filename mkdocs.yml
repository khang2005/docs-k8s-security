site_name: Wireless Sensor Hub with K3s Gateway
site_description: Documentation for Wireless Sensor Hub with K3s Gateway - Distributed sensor system with edge computing
site_url: https://docs.khangduytran.xyz

repo_name: khang2005/docs-k8s-security
repo_url: https://github.com/khang2005/docs-k8s-security

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - pymdownx.mark

plugins:
  - search
  - mermaid2

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/khangduytran
  generator: false

nav:
  - Home: index.md
  - Overview:
      - Project Overview: overview/project-overview.md
      - System Architecture: overview/system-architecture.md
      - Component Breakdown: overview/component-breakdown.md
      - Data Flow: overview/data-flow.md
  - Design:
      - Message Format: design/message-format.md
      - Technology Stack: design/technology-stack.md
      - Deployment Architecture: design/deployment-architecture.md
      - Hardware Architecture: design/hardware-architecture.md
      - Power Design: design/power-design.md
      - Reliability Design: design/reliability-design.md
      - Scalability: design/scalability.md
      - Maintenance: design/maintenance.md
      - Future Improvements: design/future-improvements.md
  - Setup:
      - Setup and Installation: setup/setup-and-installation.md
