name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy to R2 via Worker
        run: |
          cd worker && npm install
          node << 'EOF'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const bucket = 'docs-k8s-audit';
          
          const fs = require('fs');
          const path = require('path');
          
          async function uploadFile(filepath, key) {
            const body = fs.readFileSync(filepath);
            
            const response = await fetch(
              `https://api.cloudflare.com/client/v4/accounts/${accountId}/r2/buckets/${bucket}/objects/${key}`,
              {
                method: 'PUT',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/octet-stream'
                },
                body
              }
            );
            
            const data = await response.json();
            console.log(`${data.success ? '✓' : '✗'} ${key}`);
          }
          
          async function uploadDir(dir, prefix = '') {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const filepath = path.join(dir, file);
              const stat = fs.statSync(filepath);
              
              if (stat.isDirectory()) {
                await uploadDir(filepath, prefix + file + '/');
              } else {
                const key = prefix + file;
                await uploadFile(filepath, key);
              }
            }
          }
          
          uploadDir('../site');
          EOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
