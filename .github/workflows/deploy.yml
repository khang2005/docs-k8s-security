name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Build documentation
        run: mkdocs build --strict

      - name: Upload to R2
        run: |
          pip install boto3
          python3 << 'EOF'
          import boto3
          import os
          
          s3 = boto3.client(
              's3',
              endpoint_url='https://b027b5c8a41425260467575fbae51333.r2.cloudflarestorage.com',
              aws_access_key_id=os.environ['CLOUDFLARE_API_TOKEN'],
              aws_secret_access_key=os.environ['CLOUDFLARE_API_TOKEN'],
              region_name='auto'
          )
          
          for root, dirs, files in os.walk('site'):
              for file in files:
                  filepath = os.path.join(root, file)
                  key = filepath.replace('site/', '')
                  s3.upload_file(filepath, 'docs-k8s-audit', key)
                  print(f'Uploaded: {key}')
          EOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
