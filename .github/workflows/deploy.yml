name: Deploy Documentation

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy to R2
        run: |
          node << 'EOF'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const bucket = 'docs-k8s-audit';
          const fs = require('fs');
          const path = require('path');

          const mimeTypes = {
            'html': 'text/html',
            'css': 'text/css',
            'js': 'application/javascript',
            'json': 'application/json',
            'png': 'image/png',
            'jpg': 'image/jpeg',
            'jpeg': 'image/jpeg',
            'svg': 'image/svg+xml',
            'ico': 'image/x-icon',
            'xml': 'application/xml',
            'gz': 'application/gzip',
            'map': 'application/json',
            'woff': 'font/woff',
            'woff2': 'font/woff2'
          };

          function getContentType(filepath) {
            const ext = filepath.split('.').pop()?.toLowerCase();
            return mimeTypes[ext] || 'application/octet-stream';
          }

          async function uploadFile(filepath, key) {
            const body = fs.readFileSync(filepath);
            const contentType = getContentType(filepath);
            
            const response = await fetch(
              `https://api.cloudflare.com/client/v4/accounts/${accountId}/r2/buckets/${bucket}/objects/${key}`,
              { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': contentType }, body }
            );
            const data = await response.json();
            console.log(`${data.success ? '✓' : '✗'} ${key}`);
          }

          async function uploadDir(dir, prefix = '') {
            for (const file of fs.readdirSync(dir)) {
              const filepath = path.join(dir, file);
              const stat = fs.statSync(filepath);
              if (stat.isDirectory()) {
                await uploadDir(filepath, prefix + file + '/');
              } else {
                await uploadFile(filepath, prefix + file);
              }
            }
          }

          uploadDir('site');
          EOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
