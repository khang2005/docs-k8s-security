name: Deploy Documentation

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Build documentation
        run: mkdocs build --strict

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        working-directory: worker
        run: npm install

      - name: Deploy to R2
        working-directory: worker
        run: |
          npx wrangler r2 object put docs-k8s-audit/index.html --file ../site/index.html --content-type "text/html"
          npx wrangler r2 object put docs-k8s-audit/sitemap.xml --file ../site/sitemap.xml --content-type "application/xml"
          npx wrangler r2 object put docs-k8s-audit/sitemap.xml.gz --file ../site/sitemap.xml.gz --content-type "application/gzip"
          find ../site -type f ! -name "index.html" ! -name "sitemap.xml" ! -name "sitemap.xml.gz" | while read file; do
            relative_path="${file#../site/}"
            content_type=$(file --mime-type -b "$file")
            npx wrangler r2 object put "docs-k8s-audit/$relative_path" --file "$file" --content-type "$content_type"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
