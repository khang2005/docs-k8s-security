name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Build documentation
        run: mkdocs build --strict

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.CLOUDFLARE_API_TOKEN }}
          aws configure set aws_secret_access_key ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload to R2
        run: |
          aws s3 sync ./site s3://docs-k8s-audit --delete \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto \
            --no-verify-ssl
